<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Privacy Policy - Selection</title>
  <meta name="description" content="Select the Chrome extension to view its privacy policy">
  <meta name="theme-color" content="#0a0a0c">
  <link rel="stylesheet" href="../style.css">
  <link rel="icon" href="../img/profile.jpg">
  <style>
    .selection-container {
      max-width: 600px;
      text-align: center;
      padding-top: 80px;
    }

    .selection-container h1 {
      font-family: 'Thmanyah Serif Display', 'Thmanyah Sans', serif;
      font-size: 28px;
      color: var(--text-primary);
      margin-bottom: 40px;
    }

    .options-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      margin-top: 20px;
    }

    @media (min-width: 480px) {
      .options-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    .option-card {
      background: var(--bg-card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-card);
      border-radius: var(--radius);
      padding: 30px;
      text-decoration: none;
      transition: var(--transition);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    .option-card:hover {
      border-color: var(--accent);
      transform: translateY(-4px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    .option-icon {
      width: 48px;
      height: 48px;
      color: var(--accent);
      margin-bottom: 5px;
    }

    .option-name {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .option-desc {
      font-size: 14px;
      color: var(--text-muted);
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      margin-top: 40px;
      transition: var(--transition);
    }

    .back-link:hover {
      color: var(--accent);
    }
  </style>
</head>

<body>
  <!-- Language Toggle -->
  <button class="lang-toggle" id="langToggle" aria-label="Switch language">
    <svg class="globe-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
      stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10" />
      <path d="M2 12h20" />
      <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10A15.3 15.3 0 0 1 12 2z" />
    </svg>
    <span id="langLabel">EN</span>
  </button>

  <div class="container selection-container fade-in">
    <h1 id="titleText">سياسة الخصوصية</h1>

    <div class="options-grid">
      <a href="letternuvio.html" class="option-card">
        <svg class="option-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
          <line x1="8" y1="21" x2="16" y2="21"/>
          <line x1="12" y1="17" x2="12" y2="21"/>
        </svg>
        <span class="option-name">LetterNuvio</span>
        <span class="option-desc" id="descNuvio">سياسة خصوصية إضافة LetterNuvio</span>
      </a>

      <a href="letterstremio.html" class="option-card">
        <svg class="option-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        <span class="option-name">LetterStremio</span>
        <span class="option-desc" id="descStremio">سياسة خصوصية إضافة LetterStremio</span>
      </a>
    </div>

    <a href="../index.html" class="back-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 19l-7-7 7-7" class="ltr-arrow" style="display:none;" />
        <path d="M5 12h14M12 5l7 7-7 7" class="rtl-arrow" />
      </svg>
      <span id="btnBack">العودة للرئيسية</span>
    </a>

    <div class="footer fade-in" style="margin-top: 60px;">
      <p>© 2026 YASSER ALHARBI</p>
    </div>
  </div>

  <script>
    const langToggle = document.getElementById('langToggle');
    const langLabel = document.getElementById('langLabel');
    const titleText = document.getElementById('titleText');
    const descNuvio = document.getElementById('descNuvio');
    const descStremio = document.getElementById('descStremio');
    const btnBack = document.getElementById('btnBack');
    const htmlElement = document.documentElement;
    const rtlArrow = document.querySelector('.rtl-arrow');
    const ltrArrow = document.querySelector('.ltr-arrow');

    langToggle.addEventListener('click', () => {
      const isArabic = htmlElement.getAttribute('lang') === 'ar';
      if (isArabic) {
        htmlElement.setAttribute('lang', 'en');
        htmlElement.setAttribute('dir', 'ltr');
        langLabel.textContent = 'AR';
        titleText.textContent = 'Privacy Policy';
        descNuvio.textContent = 'LetterNuvio Privacy Policy';
        descStremio.textContent = 'LetterStremio Privacy Policy';
        btnBack.textContent = 'Back to Home';
        rtlArrow.style.display = 'none';
        ltrArrow.style.display = 'block';
      } else {
        htmlElement.setAttribute('lang', 'ar');
        htmlElement.setAttribute('dir', 'rtl');
        langLabel.textContent = 'EN';
        titleText.textContent = 'سياسة الخصوصية';
        descNuvio.textContent = 'سياسة خصوصية إضافة LetterNuvio';
        descStremio.textContent = 'سياسة خصوصية إضافة LetterStremio';
        btnBack.textContent = 'العودة للرئيسية';
        rtlArrow.style.display = 'block';
        ltrArrow.style.display = 'none';
      }
    });
  </script>
</body>
</html>
