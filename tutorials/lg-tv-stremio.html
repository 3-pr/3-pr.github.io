<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تعريب شاشات LG - ياسر الحربي</title>
  <meta name="description" content="طريقة تغيير الدولة في شاشات LG لتحميل تطبيق Stremio">
  <meta name="theme-color" content="#0a0a0c">
  <link rel="stylesheet" href="../style.css">
  <link rel="icon" href="../img/profile.jpg">
  <style>
    .tutorial-container {
      max-width: 700px;
      text-align: right;
      padding-top: 60px;
    }
    
    .tutorial-content {
      background: var(--bg-card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-card);
      border-radius: var(--radius);
      padding: 30px;
      margin-bottom: 24px;
    }

    .tutorial-content h1 {
      font-family: 'Thmanyah Serif Display', 'Thmanyah Sans', serif;
      font-size: 24px;
      color: var(--text-primary);
      margin-bottom: 20px;
    }

    .tutorial-content p {
      font-size: 15px;
      line-height: 1.8;
      color: var(--text-secondary);
      margin-bottom: 16px;
    }

    .video-wrapper {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      margin: 20px 0;
      border: 1px solid var(--border-card);
      background: #000;
      aspect-ratio: 9 / 16;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }

    .video-wrapper video {
      width: 100%;
      height: 100%;
      display: block;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      margin-bottom: 30px;
      transition: var(--transition);
    }

    .back-link:hover {
      color: var(--accent);
    }
  </style>
</head>
<body>

  <div class="container tutorial-container fade-in">
    
    <a href="../index.html" class="back-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
      <span>العودة للرئيسية</span>
    </a>

    <div class="tutorial-content">
      <h1>طريقة تغيير الدولة في شاشات LG لتحميل تطبيق Stremio 📺</h1>
      <p>في هذا الفيديو يشرح الأخ @_wra7 طريقة تغيير منطقة المتجر في شاشات LG لتتمكن من تحميل تطبيق Stremio الرسمي.</p>
      
      <div class="video-wrapper">
        <video controls poster="../img/tutorials/lg-tv-stremio/1.jpg">
          <source src="../img/tutorials/lg-tv-stremio/video.mp4" type="video/mp4">
          متصفحك لا يدعم تشغيل الفيديو.
        </video>
      </div>

      <p style="text-align: center; font-size: 13px; color: var(--text-muted);">الشرح مصور ومبسط يوضح كافة الخطوات من داخل إعدادات الشاشة.</p>
    </div>

    <div class="footer fade-in">
      <p>© 2026 YASSER ALHARBI</p>
    </div>

  </div>

</body>
</html>
